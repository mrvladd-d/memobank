{
  "name": "bmad",
  "label": "BMAD BMM",
  "mode_defaults": [
    "managed",
    "detect-import",
    "pattern-only"
  ],
  "channel_default": "latest",
  "binary": "npx",
  "version_command": "npx -y bmad-method --version",
  "version_regex": "(v?\\d+\\.\\d+\\.\\d+(?:[-+][0-9A-Za-z.-]+)?)",
  "install_command": "npx -y bmad-method install --directory . --modules bmm --tools codex --yes",
  "update_command": "npx -y bmad-method install --directory . --modules bmm --tools codex --yes",
  "detect_paths": [
    "_bmad/_config/manifest.yaml",
    "_bmad/bmm/config.yaml",
    ".agents/skills/bmad-bmm-create-prd/SKILL.md"
  ],
  "risk_level": "medium",
  "artifacts": [
    "project-context.md",
    "prd.md",
    "architecture.md"
  ],
  "supports": {
    "greenfield": true,
    "brownfield": true
  }
}
