# .codex/config.toml (project-scoped)
# memobank v2 default: GPT-5.4 with high reasoning.
# Use the built-in Codex `/fast` toggle for small bounded implementation work.

model = "gpt-5.4"
model_reasoning_effort = "high"
model_verbosity = "low"

[profiles.fast-lane]
model = "gpt-5.4"
model_reasoning_effort = "medium"
model_verbosity = "low"

[profiles.deep-review]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_verbosity = "low"
