name: Provider Canary

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [bmad, gsd, openspec, taskmaster]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Init temp repo
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          echo "TMP_DIR=$TMP_DIR" >> "$GITHUB_ENV"
          cd "$TMP_DIR"
          case "${{ matrix.provider }}" in
            bmad) PRESET="greenfield-standard" ;;
            gsd) PRESET="execution-only" ;;
            openspec) PRESET="brownfield-standard" ;;
            taskmaster) PRESET="greenfield-heavy" ;;
          esac
          node "$GITHUB_WORKSPACE/skills/_shared/scripts/init-mb.js" --preset "$PRESET"
      - name: Attempt provider update
        shell: bash
        run: |
          set -euo pipefail
          cd "$TMP_DIR"
          node .memory-bank/tools/provider-manager.mjs update --provider "${{ matrix.provider }}" --execute
      - name: Capture status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd "$TMP_DIR"
          node .memory-bank/tools/provider-manager.mjs status > provider-status.json || true
      - name: Create issue on canary failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const provider = '${{ matrix.provider }}';
            const title = `[provider-canary] ${provider} failed`;
            const body = `Automated provider canary failed for **${provider}** in workflow run ${context.runId}.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['provider-canary']
            });
