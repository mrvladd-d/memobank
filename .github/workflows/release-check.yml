name: Release Check

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  skill-pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Assert repository hygiene
        shell: bash
        run: |
          set -euo pipefail
          if find . -name '.DS_Store' | grep -q .; then
            echo 'Found .DS_Store files in repository'
            find . -name '.DS_Store'
            exit 1
          fi

      - name: Syntax check shared scripts and vendored package
        shell: bash
        run: |
          set -euo pipefail
          test "$(find skills -maxdepth 2 -name SKILL.md | wc -l | tr -d ' ')" = "1"
          test -f skills/memobank/SKILL.md
          node scripts/vendor-shared.mjs
          git diff --exit-code
          node -c skills/_shared/scripts/init-mb.js
          node --check skills/_shared/scripts/mb-lib.mjs
          node --check skills/_shared/scripts/provider-manager.mjs
          node --check skills/_shared/scripts/mb-run.mjs
          node --check skills/_shared/scripts/mb-index.mjs
          node --check skills/_shared/scripts/mb-condense.mjs
          node --check skills/_shared/scripts/mb-doctor.mjs
          node --check skills/_shared/scripts/mb-update.mjs
          node --check skills/mb-garden/assets/mb-lint.mjs

      - name: Local package install smoke test
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          mkdir -p "$TMP_DIR/project"
          (
            cd "$TMP_DIR/project"
            npx -y skills add "$GITHUB_WORKSPACE" --skill memobank --yes

            test -f .agents/skills/memobank/SKILL.md
            test -f .agents/skills/memobank/references/shared-structure-template.md
            test -f .agents/skills/memobank/agents/shared-repo-scanner.md
            test -f .agents/skills/memobank/scripts/shared-init-mb.js
            test -f .agents/skills/memobank/scripts/shared-mb-run.mjs
            test -f .agents/skills/memobank/scripts/shared-provider-manager.mjs

            mkdir -p target-repo
            cd target-repo
            node ../.agents/skills/memobank/scripts/shared-init-mb.js --preset greenfield-standard --doctor

            test -f .memory-bank/system/memobank.yaml
            test -f .memory-bank/system/providers.lock.json
            test -f .memory-bank/tools/mb-run.mjs
            test -f .memory-bank/tools/provider-manager.mjs
            test -f .memory-bank/product/features.json
            test -f .tasks/templates/RUN-TEMPLATE/meta.json
            test -f .protocols/templates/handoffs/template.md
            test -f .claude/skills/mb-status/SKILL.md
            test -f .agents/skills/fast-track/SKILL.md
            node .memory-bank/tools/mb-doctor.mjs --strict
            node .memory-bank/tools/mb-run.mjs resume
            node .memory-bank/tools/mb-index.mjs
            node .memory-bank/tools/provider-manager.mjs status
          )

      - name: Dry bootstrap + sync smoke test
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          (
            cd "$TMP_DIR"
            node "$GITHUB_WORKSPACE/skills/_shared/scripts/init-mb.js" --preset fast
            node "$GITHUB_WORKSPACE/skills/_shared/scripts/init-mb.js" --sync --preset brownfield-standard --sync-scope generated

            test -f .memory-bank/commands/fast-track.md
            test -f .memory-bank/workflows/fast-lane.md
            test -f .memory-bank/system/commands.manifest.json
            test -f .memory-bank/indexes/lexical.json
            test -f .claude/skills/mb-status/SKILL.md
            test -f .agents/skills/mb-update/SKILL.md
            test -f .codex/config.toml

            node .memory-bank/tools/mb-doctor.mjs --strict
            mkdir -p scripts
            cp "$GITHUB_WORKSPACE/skills/mb-garden/assets/mb-lint.mjs" scripts/mb-lint.mjs
            node scripts/mb-lint.mjs
          )
